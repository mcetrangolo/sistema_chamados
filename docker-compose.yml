services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SQLITE_NAME: data/db.sqlite3
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
      - static_data:/app/staticfiles
      - logs_data:/app/logs
      - backups_data:/app/backups

  scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SQLITE_NAME: data/db.sqlite3
    depends_on:
      - web
    command: >
      sh -c "while true; do
      python manage.py executar_varreduras;
      python manage.py backup_local;
      sleep $${SCHEDULER_INTERVAL_SECONDS:-86400};
      done"
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
      - static_data:/app/staticfiles
      - logs_data:/app/logs
      - backups_data:/app/backups

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro

volumes:
  sqlite_data:
  media_data:
  static_data:
  logs_data:
  backups_data:
