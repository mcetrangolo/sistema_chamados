services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sistema_chamados}
      POSTGRES_USER: ${POSTGRES_USER:-sistema_chamados}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_forte}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sistema_chamados} -d ${POSTGRES_DB:-sistema_chamados}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_ENGINE: postgresql
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - logs_data:/app/logs
      - backups_data:/app/backups

  scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_ENGINE: postgresql
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    command: >
      sh -c "while true; do
      python manage.py executar_varreduras;
      python manage.py backup_local;
      sleep $${SCHEDULER_INTERVAL_SECONDS:-86400};
      done"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - logs_data:/app/logs
      - backups_data:/app/backups

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro

volumes:
  postgres_data:
  media_data:
  static_data:
  logs_data:
  backups_data:
