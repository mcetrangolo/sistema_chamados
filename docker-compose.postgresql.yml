services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sistema_chamados}
      POSTGRES_USER: ${POSTGRES_USER:-sistema_chamados}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_forte}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sistema_chamados} -d ${POSTGRES_DB:-sistema_chamados}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    environment:
      DB_ENGINE: postgresql
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    environment:
      DB_ENGINE: postgresql
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
