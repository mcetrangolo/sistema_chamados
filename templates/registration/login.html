{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Sistema de Chamados</title>
  <link href="{% static 'vendor/bootstrap/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <h1 class="h4 mb-1">Sistema de Chamados de TI</h1>
      <p class="text-secondary mb-4">Entre para registrar e acompanhar atendimentos.</p>
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
          <div class="alert alert-danger">Usuário ou senha inválidos.</div>
        {% endif %}
        <div class="mb-3">
          <label class="form-label" for="{{ form.username.id_for_label }}">Usuário</label>
          {{ form.username }}
        </div>
        <div class="mb-3">
          <label class="form-label" for="{{ form.password.id_for_label }}">Senha</label>
          {{ form.password }}
        </div>
        <button class="btn btn-primary w-100" type="submit">Entrar</button>
      </form>
    </section>
  </main>
</body>
</html>
