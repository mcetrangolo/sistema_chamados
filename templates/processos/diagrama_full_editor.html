{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor amplo | {{ object.titulo }}</title>
  <link href="{% static 'vendor/bootstrap/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'css/app.css' %}?v={{ sistema_versao }}" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'vendor/bpmn-js/diagram-js.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/bpmn-js/bpmn-js.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/bpmn-js/bpmn-embedded.css' %}">
</head>
<body class="bpmn-full-page">
  <form method="post" id="bpmn-form" class="bpmn-full-form">
    {% csrf_token %}
    {{ form.xml }}
    <header class="bpmn-full-header">
      <div class="bpmn-full-title">
        <strong>{{ object.titulo }}</strong>
        <span>Editor BPMN amplo</span>
      </div>
      <div class="bpmn-full-fields">
        <label>
          Título
          {{ form.titulo }}
        </label>
        <label>
          Descrição
          {{ form.descricao }}
        </label>
        <label class="form-check">
          {{ form.ativo }}
          <span class="form-check-label">Ativo</span>
        </label>
        <label class="form-check">
          {{ form.exibir_portal }}
          <span class="form-check-label">{{ form.exibir_portal.label }}</span>
        </label>
      </div>
      <div class="bpmn-full-actions">
        <button class="btn btn-primary" type="submit">Salvar</button>
        <a class="btn btn-outline-secondary" href="{% url 'processos:editar' object.pk %}">Voltar ao modo normal</a>
      </div>
    </header>

    <section class="bpmn-full-editor">
      <div class="bpmn-toolbar">
        <div class="btn-group" role="group" aria-label="Zoom do BPMN">
          <button class="btn btn-outline-secondary" type="button" id="bpmn-zoom-out">Zoom -</button>
          <button class="btn btn-outline-secondary" type="button" id="bpmn-fit">Ajustar</button>
          <button class="btn btn-outline-secondary" type="button" id="bpmn-zoom-in">Zoom +</button>
        </div>
        <div class="bpmn-color-tools">
          <label class="bpmn-color-field" for="bpmn-fill-color">
            Fundo
            <input id="bpmn-fill-color" type="color" value="#ffffff" disabled>
          </label>
          <label class="bpmn-color-field" for="bpmn-stroke-color">
            Borda
            <input id="bpmn-stroke-color" type="color" value="#1f2937" disabled>
          </label>
          <button class="btn btn-outline-secondary" type="button" id="bpmn-apply-color" disabled>Aplicar cor</button>
          <button class="btn btn-outline-secondary" type="button" id="bpmn-clear-color" disabled>Limpar cor</button>
        </div>
        <button class="btn btn-outline-secondary" type="button" id="bpmn-download">Exportar atual</button>
        <label class="btn btn-outline-secondary mb-0" for="bpmn-import">Importar .bpmn</label>
        <input class="d-none" id="bpmn-import" type="file" accept=".bpmn,.xml">
      </div>
      <div id="bpmn-canvas" class="bpmn-canvas bpmn-full-canvas"></div>
    </section>
  </form>

  <script src="{% static 'vendor/bootstrap/bootstrap.bundle.min.js' %}"></script>
  <script src="{% static 'vendor/bpmn-js/bpmn-modeler.production.min.js' %}"></script>
  <script>
    const xmlField = document.getElementById("id_xml");
    const form = document.getElementById("bpmn-form");
    const modeler = new BpmnJS({ container: "#bpmn-canvas" });
    const canvas = modeler.get("canvas");
    const eventBus = modeler.get("eventBus");
    const modeling = modeler.get("modeling");
    const fillColor = document.getElementById("bpmn-fill-color");
    const strokeColor = document.getElementById("bpmn-stroke-color");
    const applyColorButton = document.getElementById("bpmn-apply-color");
    const clearColorButton = document.getElementById("bpmn-clear-color");
    let selectedElements = [];

    async function openDiagram(xml) {
      await modeler.importXML(xml);
      canvas.zoom("fit-viewport");
    }

    async function syncXml() {
      const result = await modeler.saveXML({ format: true });
      xmlField.value = result.xml;
      return result.xml;
    }

    function setZoom(delta) {
      const currentZoom = canvas.zoom();
      const nextZoom = Math.max(0.25, Math.min(4, currentZoom + delta));
      canvas.zoom(nextZoom);
    }

    function updateColorControls(elements) {
      selectedElements = elements.filter(function (element) {
        return element.type !== "label";
      });
      const enabled = selectedElements.length > 0;
      [fillColor, strokeColor, applyColorButton, clearColorButton].forEach(function (control) {
        control.disabled = !enabled;
      });
    }

    openDiagram(xmlField.value).catch(function () {
      alert("Não foi possível carregar o XML BPMN.");
    });

    eventBus.on("selection.changed", function (event) {
      updateColorControls(event.newSelection || []);
    });

    document.getElementById("bpmn-zoom-out").addEventListener("click", function () {
      setZoom(-0.2);
    });

    document.getElementById("bpmn-zoom-in").addEventListener("click", function () {
      setZoom(0.2);
    });

    document.getElementById("bpmn-fit").addEventListener("click", function () {
      canvas.zoom("fit-viewport");
    });

    applyColorButton.addEventListener("click", function () {
      if (!selectedElements.length) return;
      modeling.setColor(selectedElements, {
        fill: fillColor.value,
        stroke: strokeColor.value
      });
      syncXml();
    });

    clearColorButton.addEventListener("click", function () {
      if (!selectedElements.length) return;
      modeling.setColor(selectedElements, {
        fill: undefined,
        stroke: undefined
      });
      syncXml();
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      syncXml().then(function () { form.submit(); });
    });

    document.getElementById("bpmn-import").addEventListener("change", function (event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function () {
        openDiagram(reader.result).then(function () {
          xmlField.value = reader.result;
        }).catch(function () {
          alert("Arquivo BPMN inválido.");
        });
      };
      reader.readAsText(file);
    });

    document.getElementById("bpmn-download").addEventListener("click", function () {
      syncXml().then(function (xml) {
        const blob = new Blob([xml], { type: "application/xml" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "processo.bpmn";
        link.click();
        URL.revokeObjectURL(link.href);
      });
    });

    window.addEventListener("resize", function () {
      setTimeout(function () { canvas.zoom("fit-viewport"); }, 150);
    });
  </script>
</body>
</html>
