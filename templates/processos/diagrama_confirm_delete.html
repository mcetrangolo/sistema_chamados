{% extends "base.html" %}
{% block title %}Excluir BPMN | Sistema de Chamados{% endblock %}
{% block content %}
<section class="detail-section">
  <h1 class="h4">Excluir fluxo BPMN</h1>
  <p class="text-secondary">Confirme a exclusão de <strong>{{ diagrama.titulo }}</strong>.</p>
  <form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Excluir</button>
    <a class="btn btn-outline-secondary" href="{{ diagrama.get_absolute_url }}">Cancelar</a>
  </form>
</section>
{% endblock %}
