{% extends "base.html" %}
{% block title %}Categoria | Sistema de Chamados{% endblock %}
{% block content %}
<div class="content-narrow">
  <h1 class="h3 mb-3">Categoria</h1>
  <form method="post">
    {% csrf_token %}
    {% include "chamados/partials/form_fields.html" with form=form %}
    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Salvar</button>
      <a class="btn btn-outline-secondary" href="{% url 'chamados:categorias' %}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
