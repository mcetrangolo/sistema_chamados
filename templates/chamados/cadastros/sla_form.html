{% extends "base.html" %}
{% block title %}Regra de SLA | Sistema de Chamados{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">Regra de SLA</h1>
  <a class="btn btn-outline-secondary" href="{% url 'chamados:sla_regras' %}">Cancelar</a>
</div>
<form method="post" class="detail-section">
  {% csrf_token %}
  {% include "chamados/partials/form_fields.html" %}
  <button class="btn btn-primary" type="submit">Salvar</button>
</form>
{% endblock %}
