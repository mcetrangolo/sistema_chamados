{% extends "base.html" %}
{% block title %}Tipos de ativo | Inventário{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">Tipos de ativo</h1>
  <a class="btn btn-primary" href="{% url 'inventario:tipo_novo' %}">Novo tipo</a>
</div>
<section class="detail-section">
  <table class="table table-hover mb-0">
    <thead><tr><th>Nome</th><th>Status</th><th class="text-end">Ações</th></tr></thead>
    <tbody>
      {% for tipo in tipos %}
        <tr><td>{{ tipo.nome }}</td><td>{{ tipo.ativo|yesno:"Ativo,Inativo" }}</td><td class="text-end"><a class="btn btn-sm btn-outline-primary" href="{% url 'inventario:tipo_editar' tipo.pk %}">Editar</a></td></tr>
      {% empty %}
        <tr><td colspan="3" class="text-center text-secondary py-4">Nenhum tipo cadastrado.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
