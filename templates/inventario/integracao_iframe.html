{% extends "base.html" %}
{% block title %}{{ integracao.nome }} | {{ ativo.nome }}{% endblock %}
{% block content %}
<div class="page-heading mb-3">
  <div>
    <span class="section-label">Integracao externa</span>
    <h1>{{ integracao.nome }}</h1>
    <p>{{ ativo.nome }} - {{ ativo.ip|default:"sem IP" }}</p>
  </div>
  <div class="d-flex gap-2">
    <a class="btn btn-outline-secondary" href="{{ ativo.get_absolute_url }}">Voltar ao ativo</a>
    <a class="btn btn-primary" href="{{ url_integracao }}" target="_blank" rel="noopener">Abrir em nova aba</a>
  </div>
</div>

<section class="integration-frame-shell">
  <iframe src="{{ url_integracao }}" title="{{ integracao.nome }}" loading="lazy"></iframe>
</section>
{% endblock %}
